# SO-101 PickOrange PPO config — derives from RLinf's behavior_ppo_openpi_pi05
# and replaces the env with the leisaac PickOrange task. Reward is computed
# in src/rl/envs/isaaclab_pick_orange.py from physical quantities surfaced via
# the AuxObs group; r_ood is the EXP_05-aligned KNN penalty in src/rl/envs/ood_kdtree.py.

defaults:
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/bucket_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    rollout, actor: 0-1
    env: 2-3

runner:
  task_type: embodied
  logger:
    log_path: "./logs/pick_orange_ppo"
    project_name: rlinf
    experiment_name: "pick_orange_ppo_pi05"
    logger_backends: ["tensorboard"]

  only_eval: False

  max_epochs: 1000
  max_steps: -1

  val_check_interval: -1
  save_interval: 50
  seq_length: 4096
  max_prompt_length: 50

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  rollout_epoch: 2
  eval_rollout_epoch: 2

  reward_type: chunk_level
  logprob_type: token_level
  entropy_type: token_level

  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  # Soft KL anchor to SFT — diagnostic-driven: EXP_05=5.07 shows the SFT
  # policy is already far OOD; without a KL anchor PPO tends to drift further
  # before the OOD penalty bites.
  kl_beta: 0.02
  entropy_bonus: 0
  # Conservative clip — flow_sde noise + OOD penalty already provide enough
  # exploration variance. Was 0.28 in behavior; tightened to 0.2 here.
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

  # Reward already dense — no need to multiply.
  reward_coef: 1.0

# Shared env block — Phase 1 starts in single_orange mode; Phase 2 flips it
# to False after the first 1k steps (override via CLI or a Phase 2 config).
_env_common: &env_common
  env_type: isaaclab
  total_num_envs: 8
  auto_reset: False
  ignore_terminations: False
  use_rel_reward: False
  seed: 0
  group_size: 1
  reward_coef: ${algorithm.reward_coef}
  use_fixed_reset_state_ids: False
  max_steps_per_rollout_epoch: 900
  max_episode_steps: 900   # 30s @30fps; tight enough that time penalty bites OOD dwellers
  single_orange: True

  ood_reward:
    demo_dataset_path: "/home/hlei/.cache/huggingface/lerobot/EverNorif/leisaac-pick-orange"
    k_neighbors: 5
    coef: 1.0

  reward:
    reach: -0.5
    grasp: 1.0
    lift: 3.0
    align: -0.5
    place: 5.0
    rest: 1.0
    success: 10.0
    step: -0.001
    lift_h_max: 0.10
    grasp_diff_threshold: 0.05
    grasp_close_threshold: 0.60
    grasp_lift_threshold: 0.06

  init_params:
    id: "LeIsaac-SO101-PickOrange-v0"
    num_envs: null
    max_episode_steps: 900
    task_description: "Pick the orange and place it on the plate, then return the arm to rest."
    wrist_cam:
      height: 224
      width: 224
    front_cam:
      height: 224
      width: 224

env:
  group_name: "EnvGroup"
  train:
    <<: *env_common
    video_cfg:
      save_video: True
      info_on_video: True
      fps: 30
      video_base_dir: ${runner.logger.log_path}/video/train
  eval:
    <<: *env_common
    video_cfg:
      save_video: True
      info_on_video: True
      fps: 30
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: True
  pipeline_stage_num: 1

  model:
    # Pre-req: convert outputs/.../24999/params (Orbax) to PyTorch safetensors
    # via third_party/openpi/examples/convert_jax_model_to_pytorch.py — see
    # src/rl/train.py docstring for the exact command.
    model_path: "/home/hlei/robotic/lerobot-rlinf/outputs/pi05_lora_so101_pick_orange/so101_pick_orange_lora_v0/24999_pt"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 4
  global_batch_size: 64
  seed: 1234
  num_steps: 10
  enable_offload: True

  model:
    model_path: ${rollout.model.model_path}
    add_value_head: True
    num_images_in_input: 2
    proprio_dim: 6
    action_dim: 6
    num_action_chunks: 50
    openpi:
      config_name: "pi05_isaaclab_so101_pick_orange"
      detach_critic_input: True
      joint_logprob: False
      noise_level: 0.5
      action_env_dim: ${actor.model.action_dim}
      noise_method: "flow_sde"

  optim:
    lr: 1.0e-4
    value_lr: 3.0e-3
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    clip_grad: 10.0
    weight_decay: 0.01
    # Give the value head 200 steps to stabilize before actor updates use it.
    critic_warmup_steps: 200

  fsdp_config:
    strategy: "fsdp"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
