# SO-101 PickOrange DSRL config — derives from RLinf's
# libero_spatial_dsrl_openpi_pi05 but swaps the env for our leisaac PickOrange
# task. Only the ~500K-param SAC head (image/state encoders + GaussianPolicy +
# 10-head Q-net) trains; pi0.5 backbone (paligemma + gemma_expert) is frozen.
# Reward = staged task reward + KNN OOD penalty, identical to pick_orange_ppo.

defaults:
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    env, rollout, actor: all

runner:
  task_type: embodied
  logger:
    log_path: "./logs/pick_orange_dsrl"
    project_name: rlinf
    experiment_name: "pick_orange_dsrl_pi05"
    logger_backends: ["tensorboard"]

  only_eval: False

  max_epochs: 20000
  max_steps: -1

  val_check_interval: -1
  save_interval: 100

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: False
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0

  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level

  update_epoch: 200
  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"

  agg_q: mean
  actor_agg_q: mean
  backup_entropy: False
  critic_subsample_size: 0
  critic_actor_ratio: 1

  bootstrap_type: standard
  gamma: 0.999
  tau: 0.005

  entropy_tuning:
    alpha_type: softplus
    initial_alpha: 1.0
    target_entropy: -16
    optim:
      lr: 3.0e-4
      lr_scheduler: torch_constant
      clip_grad: 10.0

  replay_buffer:
    enable_cache: True
    cache_size: 15000
    sample_window_size: 15000
    min_buffer_size: 10
    auto_save: False

  target_update_freq: 1
  target_update_type: all
  train_actor_steps: 10

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

_env_common: &env_common
  env_type: isaaclab
  total_num_envs: 4
  auto_reset: False
  ignore_terminations: False
  use_rel_reward: False
  seed: 0
  group_size: 1
  reward_coef: ${algorithm.reward_coef}
  use_fixed_reset_state_ids: False
  max_steps_per_rollout_epoch: 50
  max_episode_steps: 900
  single_orange: True

  ood_reward:
    demo_dataset_path: "/home/hlei/.cache/huggingface/lerobot/EverNorif/leisaac-pick-orange"
    k_neighbors: 5
    coef: 1.0

  reward:
    reach: -0.5
    grasp: 1.0
    lift: 3.0
    align: -0.5
    place: 5.0
    rest: 1.0
    success: 10.0
    step: -0.001
    lift_h_max: 0.10
    grasp_diff_threshold: 0.05
    grasp_close_threshold: 0.60
    grasp_lift_threshold: 0.06

  init_params:
    id: "LeIsaac-SO101-PickOrange-v0"
    num_envs: null
    max_episode_steps: 900
    task_description: "Pick the orange and place it on the plate, then return the arm to rest."
    wrist_cam:
      height: 224
      width: 224
    front_cam:
      height: 224
      width: 224

env:
  group_name: "EnvGroup"
  enable_offload: False
  train:
    <<: *env_common
    video_cfg:
      save_video: False
      info_on_video: False
      fps: 30
      video_base_dir: ${runner.logger.log_path}/video/train
  eval:
    <<: *env_common
    video_cfg:
      save_video: True
      info_on_video: True
      fps: 30
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: True
  collect_prev_infos: False

  model:
    model_path: "/home/hlei/robotic/lerobot-rlinf/outputs/pi05_lora_so101_pick_orange/so101_pick_orange_lora_v0/24999_pt"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 64
  global_batch_size: 256
  seed: 42
  enable_offload: False

  model:
    model_path: ${rollout.model.model_path}
    num_images_in_input: 2
    proprio_dim: 6
    action_dim: 6
    num_action_chunks: 50
    num_steps: 3
    add_value_head: False
    add_q_head: True
    q_head_type: "default"

    openpi:
      config_name: "pi05_isaaclab_so101_pick_orange"
      use_dsrl: True
      dsrl_state_dim: 6
      dsrl_action_noise_dim: 32
      dsrl_num_q_heads: 10
      dsrl_image_latent_dim: 64
      dsrl_state_latent_dim: 64
      dsrl_hidden_dims: [128, 128, 128]
      train_expert_only: True
      detach_critic_input: True
      noise_method: "reinflow"

  optim:
    lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.96
    adam_eps: 1.0e-08
    clip_grad: 3.5

  critic_optim:
    lr: 3.0e-4
    clip_grad: 10.0
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: True
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
