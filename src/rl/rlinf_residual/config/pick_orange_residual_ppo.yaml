hydra:
  run:
    dir: .
  output_subdir: null

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: logs/rlinf_residual
    project_name: rlinf
    experiment_name: pick_orange_residual_ppo
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1
  only_eval: false
  val_check_interval: 10
  save_interval: 20
  weight_sync_interval: 1
  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 4
  normalize_advantages: true
  kl_penalty: kl
  group_size: 1
  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: action_level
  logprob_type: action_level
  entropy_type: action_level

  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: token-mean
  bootstrap_type: always
  kl_beta: 0.0
  entropy_bonus: 0.005
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95
  reward_coef: 1.0

  sampling_params:
    do_sample: true
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 0
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: 1
    max_length: 1
    min_length: 1

env:
  group_name: EnvGroup

  train:
    env_type: isaaclab
    total_num_envs: 32
    auto_reset: true
    ignore_terminations: false
    use_rel_reward: false
    use_fixed_reset_state_ids: false
    group_size: ${algorithm.group_size}
    seed: 0
    reward_coef: ${algorithm.reward_coef}
    max_episode_steps: 900
    max_steps_per_rollout_epoch: 256
    enable_offload: false

    reward:
      grasp_bonus: 10.0
      carry_speed_coef: 0.5
      place_bonus: 20.0
      drop_penalty: -5.0
      timeout_penalty: -2.0
      rest_bonus: 60.0
      fail_penalty: -5.0
      grasp_diff_threshold: 0.08
      grasp_close_threshold: 0.60
      grasp_lift_threshold: 0.06

    residual:
      pi05_jax_ckpt_dir: outputs/pi05_lora_so101_pick_orange/so101_pick_orange_lora_v0/4999
      pi05_jax_config_name: pi05_lora_so101_pick_orange
      pi05_chunk_horizon: 10
      openpi_host: 127.0.0.1
      openpi_base_port: 8124
      openpi_server_startup_s: 180.0
      openpi_handshake_grace_s: 3.0
      xla_mem_fraction: 0.5
      gpus_per_node: 8
      residual_clip: 0.0

    init_params:
      id: LeIsaac-SO101-PickOrange-Residual-v0
      isaaclab_task_id: LeIsaac-SO101-PickOrange-v0
      num_envs: 4
      max_episode_steps: 900
      episode_length_s: 30.0
      decimation: 2
      task_description: Pick the orange and place it on the plate.
      wrist_cam:
        height: 224
        width: 224
      front_cam:
        height: 224
        width: 224

    video_cfg:
      save_video: false
      info_on_video: false
      fps: 30
      video_base_dir: ${runner.logger.log_path}/video/train

  eval:
    env_type: isaaclab
    total_num_envs: 8
    auto_reset: true
    ignore_terminations: false
    use_rel_reward: false
    use_fixed_reset_state_ids: false
    group_size: ${algorithm.group_size}
    seed: 1000
    reward_coef: ${algorithm.reward_coef}
    max_episode_steps: 900
    max_steps_per_rollout_epoch: 900
    enable_offload: false
    reward: ${env.train.reward}
    residual: ${env.train.residual}
    init_params: ${env.train.init_params}
    video_cfg:
      save_video: false
      info_on_video: false
      fps: 30
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: RolloutGroup
  backend: huggingface
  enable_offload: false
  pipeline_stage_num: 1
  collect_prev_infos: true
  enable_torch_compile: false
  enable_cuda_graph: false

  model:
    model_path: ""
    precision: ${actor.model.precision}

actor:
  group_name: ActorGroup
  training_backend: fsdp
  micro_batch_size: 128
  global_batch_size: 1024
  seed: 1234
  enable_offload: false

  model:
    model_path: ""
    model_type: so101_residual_mlp
    policy_setup: so101-residual
    obs_dim: 12
    action_dim: 6
    num_action_chunks: 1
    hidden_dim: 256
    precision: "32"
    add_value_head: true
    add_q_head: false
    init_log_std: -1.0
    zero_init_actor_mean: true
    zero_init_value_head: true
    is_lora: false
    lora_rank: 32

  optim:
    lr: 1.5e-4
    value_lr: 1.5e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.0
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: fsdp
    sharding_strategy: no_shard
    gradient_checkpointing: false
    cpu_offload: false
    offload_pin_memory: false
    reshard_after_forward: true
    enable_gradient_accumulation: true
    forward_prefetch: false
    limit_all_gathers: false
    backward_prefetch: null
    use_orig_params: false
    use_liger_kernel: false
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}
    amp_autocast:
      enabled: false
      precision: bf16
    grad_scaler:
      enabled: false

weight_syncer:
  type: patch
  patch:
    snapshot_device: cpu
    delta_encoding: true
    compression: none
    init_sync:
      enabled: true
      prefixes: null
      bucket_size: 134217728

reward:
  use_reward_model: false

critic:
  use_critic_model: false
